# Docker Compose — Sandbox Isolation for Builder/Evaluator agents
# Generated by harness-scaffold for platform: web
#
# Usage: docker compose -f docker-compose.sandbox.yml up -d builder

services:
  builder:
    image: python:3.12-slim
    working_dir: /workspace
    environment:
      - HARNESS_SANDBOX=true
    volumes:
      - .:/workspace:ro
      - ./.worktrees:/workspace/.worktrees:rw
      - ./src:/workspace/src:rw
      - ./tests:/workspace/tests:rw
      - ./doc:/workspace/doc:rw
    networks:
      - sandbox
      - registry
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4g
          pids: 256
    stdin_open: true
    tty: true

  evaluator:
    image: python:3.12-slim
    working_dir: /workspace
    environment:
      - HARNESS_SANDBOX=true
      - HARNESS_ROLE=evaluator
    volumes:
      - .:/workspace:ro
    networks:
      - sandbox
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g
          pids: 128
    stdin_open: true
    tty: true

networks:
  sandbox:
    internal: true
  registry:
    driver: bridge
